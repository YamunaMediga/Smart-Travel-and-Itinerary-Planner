<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Hidden Gems & Monthly Travel - SmartVihar Planner</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      background: #f0f8ff;
      color: #333;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      min-height: 100vh;
    }

    /* Heading with background image */
    h1 {
      width: 100%;
      text-align: center;
      font-size: 3rem;
      color: #fff;
      padding: 80px 20px;
      background: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=1470&q=80') no-repeat center center;
      background-size: cover;
      position: relative;
      margin-top: 0px;
      margin-bottom: 40px;
      box-shadow: inset 0 0 0 1000px rgba(0, 0, 0, 0.4);
      /* dark overlay for readability */
    }

    h1::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.3);
      /* optional extra overlay */
    }

    h1 span {
      position: relative;
      z-index: 1;
    }

    /* Other styles */
    h2 {
      text-align: center;
      margin: 20px 0;
      color: #2c3e50;
    }

    .card-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      width: 90%;
      max-width: 1200px;
      margin-top: 20px;
    }

    .card {
      background: white;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
      transition: transform 0.3s, box-shadow 0.3s;
      cursor: pointer;
      background-color: burlywood;
    }

    .card:hover {
      transform: translateY(-8px);
      box-shadow: 0 15px 25px rgba(0, 0, 0, 0.2);
    }

    .card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }

    .card-content {
      padding: 15px;
    }

    .card-content h3 {
      font-size: 1.2rem;
      margin-bottom: 8px;
      color: #34495e;
    }

    .card-content p {
      font-size: 0.95rem;
      color: #555;
      line-height: 1.4;
    }

    .back-btn {
      margin: 50px 0 20px;
      padding: 15px 30px;
      font-size: 1rem;
      border: none;
      border-radius: 10px;
      background: #3498db;
      color: white;
      cursor: pointer;
      transition: background 0.3s;
    }

    .back-btn:hover {
      background: #2980b9;
    }

    /* Feature Cards */
    #feature-cards .card {
      background: whitesmoke;
      color: white;
      height: 250px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-size: 1.2rem;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.2);
      transition: transform 0.3s, box-shadow 0.3s, background 0.3s;
      cursor: pointer;
    }

    #feature-cards .card:hover {
      transform: translateY(-10px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25);
      background: whitesmoke;
    }

    #feature-cards .card-content h3 {
      font-size: 1.6rem;
      margin-bottom: 10px;
    }

    #feature-cards .card-content p {
      font-size: 1.1rem;
      text-align: center;
    }

    /* POPUP BACKGROUND OVERLAY */
    .place-card {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 999;
    }

    /* CARD BOX */
    .place-card .card-content {
      padding: 18px;
    }

    .place-card img {
      width: 100%;
      height: 220px;
      object-fit: cover;
    }

    .place-card>div {
      background: white;
      width: 420px;
      border-radius: 18px;
      overflow: hidden;
      animation: pop 0.4s ease;
    }

    .hidden {
      display: none;
    }

    @keyframes pop {
      from {
        transform: scale(0.7);
        opacity: 0;
      }

      to {
        transform: scale(1);
        opacity: 1;
      }
    }
  </style>
</head>

<body>

  <!-- Monthly Place Info Card -->

        <p id="cardDay1"></p>
        <p id="cardDay2"></p>
        <p id="cardDay3"></p>
      </div>
    </div>
  </div>

    };


    function generateCards(containerId, data, isMonthly = false) {
      const container = document.getElementById(containerId);
      container.innerHTML = '';

      data.forEach(item => {
        const card = document.createElement('div');
        card.classList.add('card');

        const placeName = isMonthly ? item.place : item.name;

        card.innerHTML = `
      <img src="${item.img}" alt="${placeName}">
      <div class="card-content">
        <h3>${isMonthly ? item.month + ' - ' + item.place : item.name}</h3>
        ${!isMonthly ? `<p>${item.desc}</p>` : ''}
      </div>
    `;

        // ⭐ CLICK EVENT FOR BOTH MONTHLY + HERITAGE
        card.addEventListener("click", () => {
          const info = placeInfo[placeName];

          // If no data exists, prevent crash
          if (!info) {
            alert("Details coming soon ✨");
            return;
          }

          document.getElementById("cardImg").src = item.img;
          document.getElementById("cardTitle").innerText = placeName;
          document.getElementById("cardDesc").innerText = info.desc;
          document.getElementById("cardBest").innerText = info.best;
          document.getElementById("cardFood").innerText = info.food;
          document.getElementById("cardSpecial").innerText = info.special;
          document.getElementById("cardDay1").innerText = "Day 1: " + info.day1;
          document.getElementById("cardDay2").innerText = "Day 2: " + info.day2;
          document.getElementById("cardDay3").innerText = "Day 3: " + info.day3;

          document.getElementById("placeCard").classList.remove("hidden");
        });

        container.appendChild(card);
      });
    }

    generateCards('hidden-gems', hiddenGems);
    generateCards('monthly-places', monthlyPlaces, true);

    // ===== Show category on click with dynamic heading =====
    function showCategory(categoryId, headingText) {
      document.getElementById('feature-cards').style.display = 'none';
      document.getElementById(categoryId).style.display = 'grid';
      document.getElementById('back-btn').style.display = 'block';
      document.getElementById('main-heading').textContent = headingText;
    }

    function backToFeatures() {
      document.getElementById('feature-cards').style.display = 'grid';
      document.getElementById('hidden-gems').style.display = 'none';
      document.getElementById('monthly-places').style.display = 'none';
      document.getElementById('back-btn').style.display = 'none';
      document.getElementById('main-heading').textContent = 'Our Gallery';
    }
    // Close popup when clicking outside the card
    document.getElementById("placeCard").addEventListener("click", function (e) {
      if (e.target.id === "placeCard") {
        this.classList.add("hidden");
      }
    });

  <!-- Back Button -->
  <button class="back-btn" onclick="window.location.href='index.html'">Back to Home</button>

</body>

</html>
